name: Security

on:
  push:
    branches: [main, master, development]
  pull_request:
    branches: [main, master, development]
  schedule:
    # Weekly, Monday 07:00 UTC — catch new CVEs even without PRs
    - cron: "0 7 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------- SAST: bandit + ruff security rules ----------
  sast:
    name: SAST (bandit, ruff-S)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Bandit
        run: bandit -r src/ -ll -c pyproject.toml
      - name: Ruff security rules (S)
        run: ruff check --select S src/

  # ---------- Dependency audit (CVE scan) ----------
  deps:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pip-audit
        # Runs non-strict so we capture reports without blocking on upstream LangChain
        # CVEs we can't yet fix (pinned to <0.4 series). Dependabot will propose upgrades
        # once fixed releases are published. Flip to --strict once the langchain ecosystem
        # stabilizes — tracked in the v1.0 release plan.
        run: pip-audit || true

  # ---------- Secret scanning (gitleaks) ----------
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits, not just the HEAD
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE env = free for public repos, rate-limited for private.
          # Add GITLEAKS_LICENSE secret for unrestricted private-repo use.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ---------- Self-scan: run iac-scanner on its own samples (dogfooding) ----------
  self-scan:
    name: Self-scan (iac-scan on samples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Scan-only self-check on Terraform samples
        run: iac-scan scan ./samples/tf -o ./self-out --scan-only
      - name: Upload self-scan report
        uses: actions/upload-artifact@v4
        with:
          name: self-scan-report
          path: ./self-out/
