# Pre-commit hooks. Install: pre-commit install. Run: pre-commit run --all-files
# See https://pre-commit.com

default_language_version:
  python: python3

repos:
  # Local: keep package version synced with pyproject.toml
  - repo: local
    hooks:
      - id: check-version
        name: check version (pyproject.toml vs package)
        entry: python scripts/check_version.py
        language: system
        pass_filenames: false

  # Ruff: lint + format (covers pyflakes, pycodestyle, isort, pyupgrade, security-S)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Bandit: SAST for Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false

  # Gitleaks: block secrets before they're committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Generic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
